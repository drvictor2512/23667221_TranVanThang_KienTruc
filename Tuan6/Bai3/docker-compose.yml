version: '3.8'

services:
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      JAVA_OPTS: -Xmx256m -Xms128m
    networks:
      - app-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8082:8082"
    environment:
      JAVA_OPTS: -Xmx256m -Xms128m
    networks:
      - app-network

  delivery-service:
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
    container_name: delivery-service
    ports:
      - "8083:8083"
    environment:
      JAVA_OPTS: -Xmx256m -Xms128m
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - order-service
      - payment-service
      - delivery-service
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
